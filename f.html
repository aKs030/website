<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    #game-board {
      width: 300px;
      height: 300px;
      border: 1px solid black;
      position: relative;
    }
    .snake {
      width: 20px;
      height: 20px;
      background-color: green;
      position: absolute;
    }
    .food {
      width: 20px;
      height: 20px;
      background-color: red;
      position: absolute;
    }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <div id="game-board"></div>

  <script>
    // Get a reference to the game board element
    const gameBoard = document.getElementById('game-board');

    // Set the size of each grid cell
    const CELL_SIZE = 20;

    // Set the initial snake position
    let snakeX = 0;
    let snakeY = 0;

    // Set the initial food position
    let foodX = getRandomPosition();
    let foodY = getRandomPosition();

    // Function to generate a random position
    function getRandomPosition() {
      return Math.floor(Math.random() * (gameBoard.offsetWidth / CELL_SIZE)) * CELL_SIZE;
    }

    // Function to move the snake
    function moveSnake(event) {
      switch (event.key) {
        case 'ArrowUp':
          snakeY -= CELL_SIZE;
          break;
        case 'ArrowDown':
          snakeY += CELL_SIZE;
          break;
        case 'ArrowLeft':
          snakeX -= CELL_SIZE;
          break;
        case 'ArrowRight':
          snakeX += CELL_SIZE;
          break;
      }

      // Check if the snake has reached the food
      if (snakeX === foodX && snakeY === foodY) {
        // Generate new food position
        foodX = getRandomPosition();
        foodY = getRandomPosition();
      }

      // Update the game board
      gameBoard.innerHTML = `
        <div class="snake" style="top: ${snakeY}px; left: ${snakeX}px;"></div>
        <div class="food" style="top: ${foodY}px; left: ${foodX}px;"></div>
      `;
    }

    // Add event listener for keydown events
    document.addEventListener('keydown', moveSnake);
  </script>
</body>
</html>
