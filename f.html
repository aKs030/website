<!DOCTYPE html>
<html>
<head>
  <style>
    #game-board {
      width: 300px;
      height: 300px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div id="game-board"></div>

  <script>
    // Spielvariablen
    var canvas = document.getElementById("game-board");
    var context = canvas.getContext("2d");
    var snakeSize = 20;
    var snake = [
      { x: 4 * snakeSize, y: 4 * snakeSize },
      { x: 3 * snakeSize, y: 4 * snakeSize },
      { x: 2 * snakeSize, y: 4 * snakeSize }
    ];
    var direction = "right";
    var gameLoopInterval;

    // Spiel initialisieren
    function initializeGame() {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;

      // Touchscreen-Ereignisse abfangen
      canvas.addEventListener("touchstart", handleTouchStart);
      canvas.addEventListener("touchend", handleTouchEnd);

      // Spiel-Loop starten
      gameLoopInterval = setInterval(gameLoop, 200);
    }

    // Spiel-Loop
    function gameLoop() {
      context.clearRect(0, 0, canvas.width, canvas.height);

      // Schlangenkörper zeichnen
      snake.forEach(function (segment) {
        context.fillStyle = "green";
        context.fillRect(segment.x, segment.y, snakeSize, snakeSize);
      });

      // Schlangenbewegung aktualisieren
      var head = { x: snake[0].x, y: snake[0].y };
      if (direction === "right") head.x += snakeSize;
      if (direction === "left") head.x -= snakeSize;
      if (direction === "up") head.y -= snakeSize;
      if (direction === "down") head.y += snakeSize;
      snake.unshift(head);
      snake.pop();
    }

    // Touch-Start-Ereignis behandeln
    function handleTouchStart(event) {
      event.preventDefault();
      startX = event.touches[0].clientX;
      startY = event.touches[0].clientY;
    }

    // Touch-Ende-Ereignis behandeln
    function handleTouchEnd(event) {
      event.preventDefault();
      var deltaX = event.changedTouches[0].clientX - startX;
      var deltaY = event.changedTouches[0].clientY - startY;

      // Richtung basierend auf der Touchscreen-Steuerung aktualisieren
      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        if (deltaX > 0 && direction !== "left") direction = "right";
        if (deltaX < 0 && direction !== "right") direction = "left";
      } else {
        if (deltaY > 0 && direction !== "up") direction = "down";
        if (deltaY < 0 && direction !== "down") direction = "up";
      }
    }

    // Spiel initialisieren
    initializeGame();
  </script>
</body>
</html>
