<!DOCTYPE html>
<html>
<head>
  <title>Mini Game</title>
  <style>
    #game-board {
      width: 300px;
      height: 300px;
      border: 1px solid black;
      position: relative;
    }
    #player {
      width: 50px;
      height: 50px;
      background-color: red;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <div id="game-board">
    <div id="player"></div>
  </div>

  <script>
    // Get references to the player and game board elements
    const player = document.getElementById('player');
    const gameBoard = document.getElementById('game-board');

    // Track the position of the player
    let playerX = 0;
    let playerY = 0;

    // Function to move the player
    function movePlayer(event) {
      switch (event.key) {
        case 'ArrowUp':
          playerY -= 10;
          break;
        case 'ArrowDown':
          playerY += 10;
          break;
        case 'ArrowLeft':
          playerX -= 10;
          break;
        case 'ArrowRight':
          playerX += 10;
          break;
      }

      // Update the player's position on the game board
      player.style.top = playerY + 'px';
      player.style.left = playerX + 'px';
    }

    // Add event listener for keydown events
    document.addEventListener('keydown', movePlayer);
  </script>
</body>
</html>
