<!DOCTYPE html>
<html>
<head>
  <style>
    #game-board {
      width: 400px;
      height: 400px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
  <div id="game-board"></div>

  <script>
    // Das Spiel initialisieren
    var canvas = document.getElementById("game-board");
    var context = canvas.getContext("2d");
    var snakeSize = 20;
    var snake = [
      { x: 4 * snakeSize, y: 4 * snakeSize },
      { x: 3 * snakeSize, y: 4 * snakeSize },
      { x: 2 * snakeSize, y: 4 * snakeSize }
    ];
    var direction = "right";

    // Die Spiellogik
    function gameLoop() {
      context.clearRect(0, 0, canvas.width, canvas.height);

      // Den Schlangenkörper zeichnen
      snake.forEach(function (segment) {
        context.fillStyle = "green";
        context.fillRect(segment.x, segment.y, snakeSize, snakeSize);
      });

      // Die Schlangenbewegung aktualisieren
      var head = { x: snake[0].x, y: snake[0].y };
      if (direction === "right") head.x += snakeSize;
      if (direction === "left") head.x -= snakeSize;
      if (direction === "up") head.y -= snakeSize;
      if (direction === "down") head.y += snakeSize;
      snake.unshift(head);
      snake.pop();

      // Den Spiel-Loop wiederholen
      setTimeout(gameLoop, 200);
    }

    // Die Richtung basierend auf der Touch-Bewegung aktualisieren
    canvas.addEventListener("touchstart", function (event) {
      var touch = event.touches[0];
      var startX = touch.pageX;
      var startY = touch.pageY;

      canvas.addEventListener("touchmove", function (event) {
        var touch = event.touches[0];
        var deltaX = touch.pageX - startX;
        var deltaY = touch.pageY - startY;

        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          if (deltaX > 0 && direction !== "left") direction = "right";
          if (deltaX < 0 && direction !== "right") direction = "left";
        } else {
          if (deltaY > 0 && direction !== "up") direction = "down";
          if (deltaY < 0 && direction !== "down") direction = "up";
        }
      });
    });

    // Das Spiel starten
    gameLoop();
  </script>
</body>
</html>
