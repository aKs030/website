<!DOCTYPE html>
<html>
<head>
  <style>
    .chatbox {
      width: 300px;
      height: 400px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow: auto;
    }

    .message {
      margin-bottom: 10px;
    }

    .user {
      color: blue;
    }

    .assistant {
      color: green;
    }
  </style>
</head>
<body>
  <div class="chatbox">
    <div class="message user">User: Hallo, wie kann ich Ihnen helfen?</div>
  </div>
  <input type="text" id="input-message" placeholder="Nachricht eingeben">
  <button onclick="sendMessage()">Senden</button>

  <script>
    function sendMessage() {
      var input = document.getElementById("input-message");
      var message = input.value;
      input.value = "";

      var chatbox = document.querySelector(".chatbox");
      var userMessage = document.createElement("div");
      userMessage.classList.add("message", "user");
      userMessage.textContent = "User: " + message;
      chatbox.appendChild(userMessage);

      // Hier können Sie den Nachrichteninhalt an eine Backend-Server- oder KI-Schnittstelle übergeben und die Antwort erhalten

      var assistantMessage = document.createElement("div");
      assistantMessage.classList.add("message", "assistant");
      assistantMessage.textContent = "Assistant: " + generateResponse(message);
      chatbox.appendChild(assistantMessage);

      // Scrollen Sie zum Ende der Chatbox, um die neueste Nachricht anzuzeigen
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function generateResponse(message) {
      // Hier können Sie den Nachrichteninhalt analysieren und eine passende Antwort generieren
      // Für dieses Beispiel geben wir eine statische Antwort zurück
      return "Vielen Dank für Ihre Nachricht!";
    }
  </script>
</body>
</html>
