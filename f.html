<!DOCTYPE html>
<html>
<head>
    <title>Snake Spiel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        #game-board {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #222222;
        }
        
        .snake {
            width: 20px;
            height: 20px;
            background-color: green;
        }
        
        .food {
            width: 20px;
            height: 20px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="game-board"></div>

    <script>
        var gameBoard = document.getElementById('game-board');
        var snake = [{ top: 0, left: 0 }];
        var direction = 'right';
        var food = { top: 100, left: 100 };

        function drawSnake() {
            gameBoard.innerHTML = '';
            snake.forEach(function (segment) {
                var snakeElement = document.createElement('div');
                snakeElement.className = 'snake';
                snakeElement.style.top = segment.top + 'px';
                snakeElement.style.left = segment.left + 'px';
                gameBoard.appendChild(snakeElement);
            });
        }

        function drawFood() {
            var foodElement = document.createElement('div');
            foodElement.className = 'food';
            foodElement.style.top = food.top + 'px';
            foodElement.style.left = food.left + 'px';
            gameBoard.appendChild(foodElement);
        }

        function updateSnake() {
            var head = { top: snake[0].top, left: snake[0].left };
            switch (direction) {
                case 'up':
                    head.top -= 20;
                    break;
                case 'down':
                    head.top += 20;
                    break;
                case 'left':
                    head.left -= 20;
                    break;
                case 'right':
                    head.left += 20;
                    break;
            }
            snake.unshift(head);
            if (head.top === food.top && head.left === food.left) {
                generateFood();
            } else {
                snake.pop();
            }
        }

        function generateFood() {
            var maxPos = Math.floor(gameBoard.offsetHeight / 20);
            food = {
                top: Math.floor(Math.random() * maxPos) * 20,
                left: Math.floor(Math.random() * maxPos) * 20
            };
        }

        function handleTouchStart(event) {
            var touch = event.touches[0];
            var touchX = touch.clientX;
            var touchY = touch.clientY;
            var head = snake[0];

            if (Math.abs(touchX - head.left) > Math.abs(touchY - head.top)) {
                if (touchX > head.left && direction !== 'left') {
                    direction = 'right';
                } else if (touchX < head.left && direction !== 'right') {
                    direction = 'left';
                }
            } else {
                if  (touchY < head.top && direction !== 'down') {
                    direction = 'up';
                } else if (touchY > head.top && direction !== 'up') {
                    direction = 'down';
                }
            }
        }

        function gameLoop() {
            setTimeout(function () {
                drawSnake();
                drawFood();
                updateSnake();
                gameLoop();
            }, 200);
        }

        document.addEventListener('touchstart', handleTouchStart);
        gameLoop();
    </script>
</body>
</html>
