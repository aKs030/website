    <div id="wetter"></div>
    <script>
      const API_KEY = "38ea5e3a0599b601767361a49086056b";
      const API_URL = `https://api.openweathermap.org/data/2.5/weather?q=Berlin&appid=${API_KEY}&units=metric`;

      fetch(API_URL)
        .then(response => response.json())
        .then(data => {
          const wetterDiv = document.getElementById("wetter");
          const temperatur = data.main.temp;
          const beschreibung = data.weather[0].description;
          wetterDiv.innerHTML = `Aktuelle Temperatur in Berlin: ${temperatur}°C, ${beschreibung}`;
        })
        .catch(error => {
          console.error(error);
          const wetterDiv = document.getElementById("wetter");
          wetterDiv.innerHTML = "Es gab einen Fehler beim Laden der Wetterdaten.";
        });
    </script>
