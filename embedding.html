  <div id="weather"></div>

	<script>
		$(document).ready(function() {
			$.ajax({
				url: "http://dataservice.accuweather.com/currentconditions/v1/10178?apikey=32KjL8ffscjaE56SNCysYfJK4dFsag3q&language=de-de",
				method: "GET",
				dataType: "json",
				success: function(data) {
					console.log(data);
					var location = data[0].LocalizedName + ", " + data[0].Country.LocalizedName;
					var temp = data[0].Temperature.Metric.Value + "°C";
					var condition = data[0].WeatherText;
					var icon = "https://developer.accuweather.com/sites/default/files/" + data[0].WeatherIcon + "-s.png";
					var html = "<h2>" + location + "</h2>";
					html += "<img src='" + icon + "'><br>";
					html += "<b>" + temp + "</b><br>";
					html += condition;
					$("#weather").html(html);
				},
				error: function(error) {
					console.log(error);
					$("#weather").html("<p>Fehler beim Abrufen der Wetterdaten</p>");
					alert("Fehler beim Abrufen der Wetterdaten");
				}
			});
		});
	</script>
