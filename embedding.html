<script>
      $(function() {
        var apiKey = "32KjL8ffscjaE56SNCysYfJK4dFsag3q";
        var city = "295015";
        var apiUrl = "https://dataservice.accuweather.com/currentconditions/v1/295015?apikey=" + apiKey + "&language=de-de&details=true";

        $.getJSON(apiUrl, function(data) {
          var weather = data[0];
          var temperature = weather.Temperature.Metric.Value;
          var iconNumber = weather.WeatherIcon < 10 ? "0" + weather.WeatherIcon : weather.WeatherIcon;
          var iconUrl = "https://developer.accuweather.com/sites/default/files/" + iconNumber + "-s.png";
          var description = weather.WeatherText;
          var windSpeed = weather.Wind.Speed.Metric.Value;
          var windDirection = weather.Wind.Direction.Localized;

          $("#city").text(city);
          $("#temperature").text(temperature + "°C");
          $("#icon").attr("src", iconUrl);
          $("#description").text(description);
          $("#wind").text(windSpeed + " " + windDirection);
        });
      });
    </script>
