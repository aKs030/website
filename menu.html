  <script>
    $(document).ready(function(){
      var back_to_top_button = ['<a href="#top" class="back-to-top">  
        
        <img src="IMG_0801.png">
      
        </a>'].join("");
      $("body").append(back_to_top_button)
      $(".back-to-top").hide();
    
      $(function () {
        $(window).scroll(function () {
          if ($(this).scrollTop() > 100) {
            $('.back-to-top').fadeIn();
          } else {
            $('.back-to-top').fadeOut();
          }
        });
    
        $('.back-to-top').click(function () {
          $('body,html').animate({
            scrollTop: 0
          }, 800);
          return false;
        });
      });
    
    });
    </script>
