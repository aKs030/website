<!DOCTYPE html>
<html>
<head>
	<title>Aktuelle Wettervorhersage für Berlin, Deutschland</title>
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
		$(document).ready(function(){
			var apikey = "32KjL8ffscjaE56SNCysYfJK4dFsag3q";
			var location = "Berlin,DE";
			var url = "http://dataservice.accuweather.com/currentconditions/v1/" + location + "?apikey=" + apikey;
			$.getJSON(url, function(data){
				var temp = data[0].Temperature.Metric.Value;
				var weather = data[0].WeatherText;
				var icon = "https://www.accuweather.com/images/weathericons/" + data[0].WeatherIcon + ".svg";
				$("#temperature").html(temp + "°C");
				$("#weather").html(weather);
				$("#icon").attr("src", icon);
			});
		});
	</script>
</head>
<body>
	<h1>Aktuelle Wettervorhersage für Berlin, Deutschland</h1>
	<p>Temperatur: <span id="temperature"></span></p>
	<p>Wetter: <span id="weather"></span></p>
	<img id="icon" src="" alt="Wetter-Icon">
</body>
</html>
